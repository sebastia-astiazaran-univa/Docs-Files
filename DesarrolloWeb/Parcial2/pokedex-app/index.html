<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Catálogo Pokémon con búsqueda y detalle." />
    <title>Pokédex Nacional | Inicio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="inicio">
    <a class="skip-link" href="#main">Saltar al contenido</a>

    <header class="site-header">
      <div class="header-inner glass-panel">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">⚡</span>
          <h1 class="brand-title">Pokédex Nacional</h1>
        </div>
        <nav class="section-nav" aria-label="Secciones de la Pokédex">
          <a class="section-link active" href="index.html" aria-current="page">Inicio</a>
          <a class="section-link" href="movimientos.html">Movimientos</a>
          <a class="section-link" href="items.html">Ítems</a>
          <a class="section-link" href="equipo.html">Mi equipo</a>
        </nav>
        <div class="header-controls">
          <label class="search-field">
            <span class="visually-hidden">Buscar Pokémon por nombre o ID</span>
            <input
              type="search"
              id="search-input"
              class="search-input"
              placeholder="Buscar por nombre o ID…"
              autocomplete="off"
              spellcheck="false"
              aria-controls="pokemon-grid"
            />
          </label>
          <button
            type="button"
            id="theme-toggle"
            class="btn-theme"
            aria-label="Alternar modo claro u oscuro"
            title="Tema"
          >
            <span class="theme-icon theme-icon--sun" aria-hidden="true">☀</span>
            <span class="theme-icon theme-icon--moon" aria-hidden="true">☾</span>
          </button>
        </div>
      </div>
    </header>

    <div
      id="error-banner"
      class="error-banner"
      role="alert"
      hidden
    ></div>

    <main id="main" class="main">
      <p class="intro">
        Explora la Pokédex. Los datos provienen de
        <a href="https://pokeapi.co/" target="_blank" rel="noopener noreferrer"
          >PokeAPI</a
        >.
      </p>
      <div class="grid-container">
        <div
          id="pokemon-grid"
          class="pokemon-grid"
          role="list"
          aria-live="polite"
          aria-label="Lista de Pokémon"
        ></div>
        <div
          id="sentinel"
          class="sentinel"
          aria-hidden="true"
          data-testid="infinite-scroll-sentinel"
        ></div>
      </div>
    </main>

    <div
      id="modal-overlay"
      class="modal-overlay"
      hidden
      aria-hidden="true"
    ></div>
    <div
      id="modal"
      class="modal glass-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      hidden
      tabindex="-1"
    >
      <button
        type="button"
        id="modal-close"
        class="modal-close"
        aria-label="Cerrar detalle"
      >
        ×
      </button>
      <div id="modal-content" class="modal-content">
        <p class="modal-loading">Cargando detalle…</p>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
